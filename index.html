    <!-- ─── Inline Schema for Dynamic Updates ────────────────────────────── -->
    <script>
      // This script will dynamically update the title and meta tags based on the current page view
      (function() {
        // Store original title for reference
        const siteName = 'Pruta Academy';
        const defaultTitle = 'Pruta Academy — #1 Tech School for Coding, AI & Web Development';
        const defaultDescription = 'Learn coding, AI, and web development with structured 3-month courses. Progress at your own pace, earn verified certificates, and transform your career.';
        
        // Listen for view changes (this will be called from React)
        window.updatePageMetadata = function(title, description, keywords) {
          // Update title
          if (title) {
            document.title = title + ' | ' + siteName;
          } else {
            document.title = defaultTitle;
          }
          
          // Update meta description
          const metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc && description) {
            metaDesc.setAttribute('content', description);
          }
          
          // Update Open Graph title
          const ogTitle = document.querySelector('meta[property="og:title"]');
          if (ogTitle && title) {
            ogTitle.setAttribute('content', title + ' | ' + siteName);
          }
          
          // Update Open Graph description
          const ogDesc = document.querySelector('meta[property="og:description"]');
          if (ogDesc && description) {
            ogDesc.setAttribute('content', description);
          }
          
          // Update Twitter title
          const twTitle = document.querySelector('meta[name="twitter:title"]');
          if (twTitle && title) {
            twTitle.setAttribute('content', title + ' | ' + siteName);
          }
          
          // Update Twitter description
          const twDesc = document.querySelector('meta[name="twitter:description"]');
          if (twDesc && description) {
            twDesc.setAttribute('content', description);
          }
          
          // Update keywords if provided
          const metaKeywords = document.querySelector('meta[name="keywords"]');
          if (metaKeywords && keywords) {
            metaKeywords.setAttribute('content', keywords);
          }
        };
        
        // Auto-detect page changes using MutationObserver
        if (window.MutationObserver) {
          const observer = new MutationObserver(function() {
            // Check if the title has changed
            const currentTitle = document.title;
            if (currentTitle && !currentTitle.includes(siteName)) {
              // Title was changed by React, update meta tags accordingly
              const metaDesc = document.querySelector('meta[name="description"]');
              const ogTitle = document.querySelector('meta[property="og:title"]');
              const twTitle = document.querySelector('meta[name="twitter:title"]');
              
              // Update Open Graph and Twitter titles if they don't match
              if (ogTitle) {
                ogTitle.setAttribute('content', currentTitle);
              }
              if (twTitle) {
                twTitle.setAttribute('content', currentTitle);
              }
            }
          });
          
          // Start observing document title changes
          observer.observe(document.querySelector('title'), {
            subtree: true,
            characterData: true,
            childList: true
          });
        }
      })();
    </script>
