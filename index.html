    <!-- ─── ANTI-INSPECTION PROTECTION ────────────────────────────────────── -->
    <!-- Add this section right here -->
    <script>
      // ─── Anti-Inspection Protection ──────────────────────────────────────
      
      // 1. Disable right click
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        e.stopPropagation();
        return false;
      });

      // 2. Disable keyboard shortcuts for dev tools
      document.addEventListener('keydown', function(e) {
        // F12
        if (e.key === 'F12') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+Shift+I (Inspect), Ctrl+Shift+J (Console), Ctrl+Shift+C (Inspect Element)
        if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+U (View Source)
        if (e.ctrlKey && e.key === 'u') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+S (Save Page)
        if (e.ctrlKey && e.key === 's') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+P (Print)
        if (e.ctrlKey && e.key === 'p') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+Shift+K (Console in Firefox)
        if (e.ctrlKey && e.shiftKey && e.key === 'K') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+Shift+E (Network in Firefox)
        if (e.ctrlKey && e.shiftKey && e.key === 'E') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // PrintScreen
        if (e.key === 'PrintScreen') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
        
        // Ctrl+Shift+P (Command Palette in Chrome)
        if (e.ctrlKey && e.shiftKey && e.key === 'P') {
          e.preventDefault();
          e.stopPropagation();
          return false;
        }
      });

      // 3. Disable drag and drop
      document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
      });
      
      document.addEventListener('drop', function(e) {
        e.preventDefault();
        return false;
      });

      // 4. Disable text selection (allow in input fields)
      document.addEventListener('selectstart', function(e) {
        const target = e.target;
        if (target.tagName === 'INPUT' || target.tagName === 'TEXTAREA') {
          return true;
        }
        e.preventDefault();
        return false;
      });

      // 5. Prevent image dragging
      document.addEventListener('drag', function(e) {
        if (e.target.tagName === 'IMG') {
          e.preventDefault();
          return false;
        }
      });

      // 6. Block media context menu
      document.addEventListener('mousedown', function(e) {
        if (e.target.tagName === 'IMG' || e.target.tagName === 'VIDEO') {
          e.preventDefault();
          return false;
        }
      });

      // 7. Disable console in production
      if (window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        console.log = function() {};
        console.warn = function() {};
        console.error = function() {};
        console.info = function() {};
        console.debug = function() {};
        console.trace = function() {};
        console.dir = function() {};
        console.dirxml = function() {};
        console.group = function() {};
        console.groupEnd = function() {};
        console.table = function() {};
        console.assert = function() {};
        console.count = function() {};
        console.time = function() {};
        console.timeEnd = function() {};
        console.clear();
      } else {
        // In development, redact sensitive info
        const originalLog = console.log;
        console.log = function(...args) {
          const filtered = args.map(arg => {
            if (typeof arg === 'string') {
              return arg.replace(/https?:\/\/[a-zA-Z0-9-]+\.supabase\.co[^\s"]*/g, '[REDACTED]')
                        .replace(/[a-zA-Z0-9_-]{20,}/g, '[REDACTED]');
            }
            return arg;
          });
          originalLog.apply(console, filtered);
        };
      }

      // 8. Clear console on load
      console.clear();

      // 9. Detect DevTools opening
      let devtoolsOpen = false;
      setInterval(function() {
        const threshold = 160;
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
          if (!devtoolsOpen) {
            devtoolsOpen = true;
            // Optional: Show a warning or redirect
            // alert('Please close developer tools for optimal experience.');
          }
        } else {
          devtoolsOpen = false;
        }
      }, 2000);

      // 10. Prevent window.open for dev tools
      const originalOpen = window.open;
      window.open = function(url) {
        if (typeof url === 'string' && (url.includes('devtools') || url.includes('about:blank'))) {
          return null;
        }
        return originalOpen.apply(window, arguments);
      };

      // 11. Prevent view-source
      const originalLocation = Object.getOwnPropertyDescriptor(window, 'location');
      if (originalLocation) {
        Object.defineProperty(window, 'location', {
          ...originalLocation,
          set: function(value) {
            if (typeof value === 'string' && value.includes('view-source:')) {
              return;
            }
            originalLocation.set.call(this, value);
          }
        });
      }

      console.log('🔒 Content protection enabled.');
    </script>

    <!-- ─── Inline Schema for Dynamic Updates ────────────────────────────── -->
    <script>
      // This script will dynamically update the title and meta tags based on the current page view
      (function() {
        // Store original title for reference
        const siteName = 'Pruta Academy';
        const defaultTitle = 'Pruta Academy — #1 Tech School for Coding, AI & Web Development';
        const defaultDescription = 'Learn coding, AI, and web development with structured 3-month courses. Progress at your own pace, earn verified certificates, and transform your career.';
        
        // Listen for view changes (this will be called from React)
        window.updatePageMetadata = function(title, description, keywords) {
          // Update title
          if (title) {
            document.title = title + ' | ' + siteName;
          } else {
            document.title = defaultTitle;
          }
          
          // Update meta description
          const metaDesc = document.querySelector('meta[name="description"]');
          if (metaDesc && description) {
            metaDesc.setAttribute('content', description);
          }
          
          // Update Open Graph title
          const ogTitle = document.querySelector('meta[property="og:title"]');
          if (ogTitle && title) {
            ogTitle.setAttribute('content', title + ' | ' + siteName);
          }
          
          // Update Open Graph description
          const ogDesc = document.querySelector('meta[property="og:description"]');
          if (ogDesc && description) {
            ogDesc.setAttribute('content', description);
          }
          
          // Update Twitter title
          const twTitle = document.querySelector('meta[name="twitter:title"]');
          if (twTitle && title) {
            twTitle.setAttribute('content', title + ' | ' + siteName);
          }
          
          // Update Twitter description
          const twDesc = document.querySelector('meta[name="twitter:description"]');
          if (twDesc && description) {
            twDesc.setAttribute('content', description);
          }
          
          // Update keywords if provided
          const metaKeywords = document.querySelector('meta[name="keywords"]');
          if (metaKeywords && keywords) {
            metaKeywords.setAttribute('content', keywords);
          }
        };
        
        // Auto-detect page changes using MutationObserver
        if (window.MutationObserver) {
          const observer = new MutationObserver(function() {
            // Check if the title has changed
            const currentTitle = document.title;
            if (currentTitle && !currentTitle.includes(siteName)) {
              // Title was changed by React, update meta tags accordingly
              const metaDesc = document.querySelector('meta[name="description"]');
              const ogTitle = document.querySelector('meta[property="og:title"]');
              const twTitle = document.querySelector('meta[name="twitter:title"]');
              
              // Update Open Graph and Twitter titles if they don't match
              if (ogTitle) {
                ogTitle.setAttribute('content', currentTitle);
              }
              if (twTitle) {
                twTitle.setAttribute('content', currentTitle);
              }
            }
          });
          
          // Start observing document title changes
          observer.observe(document.querySelector('title'), {
            subtree: true,
            characterData: true,
            childList: true
          });
        }
      })();
    </script>
